
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Labo Buddy RC1.3 Core</title>
<style>
:root{--b:#2b7de9;--bg:#f4f7fb;--txt:#1f2937;--muted:#6b7280;--line:#d8e0ee;--green:#16a34a;--purple:#9333ea}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--txt);padding-bottom:112px}
header{background:linear-gradient(135deg,#2b7de9,#67a8ff);color:#fff;padding:16px;position:sticky;top:0;z-index:5}
h1{font-size:20px;margin:0} header p{margin:4px 0 0;font-size:12px;opacity:.9}
main{padding:10px 12px}.card{background:#fff;border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(27,48,87,.08)}
h2{font-size:18px;margin:0 0 10px}
label{display:block;margin-top:10px;font-weight:700;font-size:13px}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:16px;margin-top:6px}
textarea{min-height:64px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{border:0;border-radius:13px;background:var(--b);color:#fff;padding:12px;font-weight:800;font-size:15px}.sub{background:#eef5ff;color:#1d5fbf}.danger{background:#ffecec;color:#c82b2b}.gray{background:#eef0f4;color:#374151}
.actions{display:flex;gap:8px;margin-top:12px}.actions .btn{flex:1}
.tab{display:none}.tab.active{display:block}
.nav{position:fixed;left:10px;right:10px;bottom:calc(12px + env(safe-area-inset-bottom));background:#fff;border-radius:20px;padding:10px 6px;display:flex;justify-content:space-around;box-shadow:0 6px 22px #0003;z-index:10}
.nav button{border:0;background:transparent;color:#445;font-size:12px;font-weight:700;padding:6px 7px;border-radius:12px}.nav button.active{background:#eef5ff;color:#1d5fbf}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#f7fbff;border:1px solid #dcecff;border-radius:14px;padding:10px;text-align:center}.stat b{font-size:19px;color:#1d5fbf}.stat span{display:block;font-size:11px;color:var(--muted)}
.item{border:1px solid var(--line);border-radius:14px;padding:12px;margin:9px 0;background:#fff}.item h3{margin:0;font-size:16px}.item p{margin:5px 0;color:#555;font-size:13px}.pill{display:inline-block;background:#eef5ff;color:#1d5fbf;border-radius:999px;padding:3px 8px;font-size:12px;margin:2px}.money{color:var(--green);font-weight:900}.hideMoney .money{filter:blur(7px);user-select:none}
.calendar{border:1px solid var(--line);border-radius:14px;overflow:hidden}.calHead,.calGrid{display:grid;grid-template-columns:repeat(7,1fr)}.calHead{background:#eef5ff;color:#2563eb;font-size:11px;text-align:center}.calHead div{padding:7px 0}.day{min-height:38px;padding:5px;border-top:1px solid #eef2f7;border-right:1px solid #eef2f7;font-size:12px}.today{background:#fff7da;font-weight:900}.dot{width:6px;height:6px;background:var(--b);border-radius:50%;display:inline-block;margin-left:2px}
.due{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:900}.over,.todayDue{background:#fee2e2;color:#dc2626}.tomorrow{background:#ffedd5;color:#f97316}.soon{background:#fef9c3;color:#a16207}.later{background:#dcfce7;color:#15803d}
.segment{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}.segment label{margin:0}.segment input{display:none}.segment span{display:block;text-align:center;border:1px solid var(--b);border-radius:12px;padding:10px;color:#1d5fbf;background:#fff;font-weight:800}.segment input:checked+span{background:var(--b);color:#fff}
.statusBadge{display:inline-block;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;cursor:pointer;vertical-align:middle;margin-left:6px}.st0{background:#eef2f7;color:#475569}.st1{background:#fef3c7;color:#b45309}.st2{background:#dcfce7;color:#15803d}
.toothBox{background:#f8fbff;border:1px solid #dcecff;border-radius:14px;padding:10px;margin-top:6px}.mode{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.mode button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px;font-weight:800}.mode .active{border:2px solid var(--b);color:#1d5fbf}.toothRow{display:flex;justify-content:center;gap:4px;margin:6px 0}.gap{width:12px}.tooth{width:34px;height:34px;border:1px solid #9bbcff;background:#fff;color:#1d5fbf;border-radius:10px;font-weight:900}.tooth.base{background:var(--b);color:#fff}.tooth.pontic{background:var(--purple);border-color:var(--purple);color:#fff}.jaw,.small{font-size:12px;color:var(--muted);text-align:center}
.shadeQuick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}.shadeQuick button{padding:10px;border:2px solid #2b7de9;border-radius:10px;background:#fff;color:#2b7de9;font-weight:800}.shadeQuick button.sel{background:#eef5ff;border:3px solid #145ee8}
.empty{text-align:center;color:var(--muted);padding:22px 8px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ddd;padding:8px;text-align:left}
#overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;display:none;overflow:hidden}.conf{position:absolute;top:-30px;width:12px;height:18px;animation:fall 3.4s linear forwards;border-radius:2px}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}#clearBanner{display:none;background:linear-gradient(135deg,#ecfdf5,#fff7d6);border:2px solid #22c55e;color:#166534;padding:14px;border-radius:16px;text-align:center;font-weight:900;margin-bottom:10px;box-shadow:0 4px 18px #16a34a22}
</style>
</head>
<body>
<header><h1>🦷 Labo Buddy RC1</h1><p>RC1.3：コア料金を追加・医院別に自動反映</p></header>
<main>
<div id="clearBanner">🏆 Buddy Clear!<br>🎊 明日のセット準備OK！<br>本日もお疲れさまでした！</div>
<button class="btn sub" id="moneyToggle" onclick="toggleMoney()">🙈 金額を隠す</button>

<section id="home" class="tab active">
<div class="card"><h2>🏠 ホーム</h2><div class="stats"><div class="stat"><b id="tomorrowCount">0</b><span>明日セット</span></div><div class="stat"><b id="doneCount">0</b><span>明日完了</span></div><div class="stat"><b class="money" id="monthSales">¥0</b><span>今月売上</span></div></div></div>
<div class="card"><h2>🚨 明日セット一覧</h2><div id="tomorrowBox"></div></div>
<div class="card"><h2>⏳ 納期カウントダウン</h2><div id="countdownBox"></div></div>
<div class="card"><h2 id="calTitle">📅 カレンダー</h2><div class="calendar"><div class="calHead"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div><div id="calGrid" class="calGrid"></div></div></div>
</section>

<section id="form" class="tab"><div class="card"><h2 id="formTitle">➕ 患者登録</h2><input type="hidden" id="editId">
<label>歯科医院</label><select id="clinic" onchange="applyPrice()"></select>
<label>患者名</label><input id="patient" placeholder="例：山田 太郎">
<label>部位・歯式</label><div class="toothBox">
<div class="mode"><button id="mBase" type="button" class="active" onclick="setMode('base')">支台歯</button><button id="mPontic" type="button" onclick="setMode('pontic')">ポンティック</button><button type="button" onclick="clearTeeth()">クリア</button></div>
<div class="jaw">上顎　右 87654321｜12345678 左</div><div id="upper" class="toothRow"></div><div id="lower" class="toothRow"></div><div class="jaw">下顎　右 87654321｜12345678 左</div>
<input id="teeth" placeholder="選択した部位が入ります"><p class="small" id="autoInfo">支台歯 0本 / ポンティック 0本</p></div>
<div class="row"><div><label>区分</label><select id="category"><option>保険</option><option>自費</option></select></div><div><label>セット日</label><input id="dueDate" type="date"></div></div>
<label>技工物</label><select id="workType" onchange="toggleShade();applyPrice();updateAutoInfo()"><option>前装冠</option><option>FMC</option><option>CAD/CAM冠</option><option>ハイブリッド</option><option>ジルコニア</option><option>インレー単純</option><option>インレー複雑</option><option>5分の4冠</option><option>アンレー</option><option>コア</option><option>ポンティック</option></select>
<label>形態</label><div class="segment"><label><input type="radio" name="kind" value="単冠" checked><span>単冠</span></label><label><input type="radio" name="kind" value="連結冠"><span>連結冠</span></label><label><input type="radio" name="kind" value="ブリッジ"><span>ブリッジ</span></label></div>
<div id="shadeArea"><label>シェード</label><div class="shadeQuick"><button type="button" onclick="setShade('A1',this)">A1</button><button type="button" onclick="setShade('A2',this)">A2</button><button type="button" onclick="setShade('A3',this)">A3</button><button type="button" onclick="setShade('A3.5',this)">A3.5</button></div><details style="margin-top:8px"><summary>その他のシェード</summary><select id="shade" onchange="syncShadeButtons();toggleCustomShade()"><option></option><option>A1</option><option>A2</option><option>A3</option><option>A3.5</option><option>A4</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option><option>D2</option><option>BL1</option><option>BL2</option><option>その他</option></select></details><input id="customShade" placeholder="その他のシェード" style="display:none"></div>
<div class="row"><div><label>本数</label><input id="qty" type="number" min="1" value="1"></div><div><label>単価</label><input id="unitPrice" type="number" min="0"></div></div>
<label>金属</label><select id="metal"><option>なし</option><option>パラジウム</option><option>銀合金</option></select><label>メモ</label><textarea id="memo"></textarea>
<div class="actions"><button class="btn" onclick="saveCase()">保存</button><button class="btn gray" onclick="resetForm()">クリア</button></div></div></section>

<section id="clinicsTab" class="tab"><div class="card"><h2>🏥 医院マスター</h2><label>医院名</label><input id="clinicName"><label style="display:flex;gap:8px;align-items:center"><input id="clinicFav" type="checkbox" style="width:auto;margin:0"> よく使う医院</label>
<div class="row3"><div><label>前装冠</label><input id="p前装冠" type="number"></div><div><label>FMC</label><input id="pFMC" type="number"></div><div><label>ポンティック</label><input id="pポンティック" type="number"></div></div>
<div class="row3"><div><label>CAD/CAM冠</label><input id="pCAD" type="number"></div><div><label>ハイブリッド</label><input id="pハイブリッド" type="number"></div><div><label>ジルコニア</label><input id="pジルコニア" type="number"></div></div>
<div class="row3"><div><label>インレー単純</label><input id="pインレー単純" type="number"></div><div><label>インレー複雑</label><input id="pインレー複雑" type="number"></div><div><label>5分の4冠</label><input id="p5分の4冠" type="number"></div></div>
<div class="row3"><div><label>アンレー</label><input id="pアンレー" type="number"></div><div><label>コア</label><input id="pコア" type="number"></div><div></div></div><div class="actions"><button class="btn" onclick="saveClinic()">医院保存</button><button class="btn gray" onclick="clearClinicForm()">クリア</button></div><div id="clinicList"></div></div></section>
<section id="list" class="tab"><div class="card"><h2>📋 一覧</h2><input id="search" placeholder="医院名・患者名で検索" oninput="renderList()"><div id="caseList"></div></div></section>
<section id="summary" class="tab"><div class="card"><h2>📊 集計</h2><div id="summaryBox"></div></div></section>
</main>
<nav class="nav"><button class="active" onclick="show('home',this)">🏠<br>ホーム</button><button onclick="show('form',this)">➕<br>登録</button><button onclick="show('clinicsTab',this)">🏥<br>医院</button><button onclick="show('list',this)">📋<br>一覧</button><button onclick="show('summary',this)">📊<br>集計</button></nav>
<div id="overlay"></div>
<script>
const CK='lb_rc1_cases', HK='lb_rc1_clinics';
let cases=JSON.parse(localStorage.getItem(CK)||'[]'),clinics=JSON.parse(localStorage.getItem(HK)||'[]'),teethMap={},mode='base';
if(!clinics.length){clinics=[{name:'サンプル歯科',favorite:true,prices:{'前装冠':5000,'FMC':4500,'ポンティック':3000,'CAD/CAM冠':4800,'ハイブリッド':5000,'ジルコニア':6000,'インレー単純':3500,'インレー複雑':4000,'5分の4冠':4500,'アンレー':4500,'コア':1500}}];localStorage.setItem(HK,JSON.stringify(clinics))}
clinics.forEach(c=>{c.prices=c.prices||{}; if(c.prices['コア']===undefined)c.prices['コア']=0});
localStorage.setItem(HK,JSON.stringify(clinics));
const $=id=>document.getElementById(id),yen=n=>'¥'+Number(n||0).toLocaleString(),today=()=>new Date().toISOString().slice(0,10),tomorrow=()=>new Date(Date.now()+86400000).toISOString().slice(0,10);
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function save(){localStorage.setItem(CK,JSON.stringify(cases));renderAll()}function saveC(){localStorage.setItem(HK,JSON.stringify(clinics));renderClinicOptions();renderAll()}
function show(id,b){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderAll();scrollTo(0,0)}
function toggleMoney(){document.body.classList.toggle('hideMoney');$('moneyToggle').textContent=document.body.classList.contains('hideMoney')?'👁 金額を表示':'🙈 金額を隠す'}
function diff(d){if(!d)return null;return Math.round((new Date(d)-new Date(today()))/86400000)}
function badge(d){let x=diff(d);if(x===null)return'';if(x<0)return`<span class="due over">${-x}日超過</span>`;if(x===0)return`<span class="due todayDue">今日</span>`;if(x===1)return`<span class="due tomorrow">明日</span>`;if(x<=3)return`<span class="due soon">あと${x}日</span>`;return`<span class="due later">あと${x}日</span>`}
function statusBadge(c){let s=c.status||'未着手',cls=s==='完了'?'st2':s==='作業中'?'st1':'st0';return`<span class="statusBadge ${cls}" onclick="cycleStatus('${c.id}')">${s}</span>`}
function cycleStatus(id){let c=cases.find(x=>x.id===id);if(!c)return;let o=['未着手','作業中','完了'];c.status=o[(o.indexOf(c.status||'未着手')+1)%3];save();checkClear()}
function setMode(m){mode=m;$('mBase').classList.toggle('active',m==='base');$('mPontic').classList.toggle('active',m==='pontic')}
function makeTeeth(){let nums=['8','7','6','5','4','3','2','1','1','2','3','4','5','6','7','8'];let add=(wrap,jaw)=>{wrap.innerHTML='';nums.forEach((n,i)=>{if(i===8){let g=document.createElement('div');g.className='gap';wrap.appendChild(g)}let b=document.createElement('button');b.type='button';b.className='tooth';b.textContent=n;b.dataset.id=(i<8?'右':'左')+jaw+n;b.onclick=()=>{teethMap[b.dataset.id]===mode?delete teethMap[b.dataset.id]:teethMap[b.dataset.id]=mode;paintTeeth()};wrap.appendChild(b)})};add($('upper'),'上');add($('lower'),'下')}
function paintTeeth(){document.querySelectorAll('.tooth').forEach(b=>{b.classList.remove('base','pontic');if(teethMap[b.dataset.id])b.classList.add(teethMap[b.dataset.id])});$('teeth').value=Object.entries(teethMap).map(([k,v])=>k+(v==='pontic'?'P':'')).join('・');updateAutoInfo()}
function clearTeeth(){teethMap={};paintTeeth()}
function baseN(c){return c.teethData?Object.values(c.teethData).filter(v=>v==='base').length:Number(c.qty||1)}
function ponticN(c){return c.teethData?Object.values(c.teethData).filter(v=>v==='pontic').length:0}
function pPrice(c){let cl=clinics.find(x=>x.name===c.clinic);return Number(cl?.prices?.['ポンティック']||0)}
function amount(c){return baseN(c)*Number(c.unitPrice||0)+ponticN(c)*pPrice(c)}
function setKind(v){document.querySelectorAll('input[name=kind]').forEach(r=>r.checked=r.value===v)}function getKind(){return document.querySelector('input[name=kind]:checked').value}
function updateAutoInfo(){let b=Object.values(teethMap).filter(v=>v==='base').length,p=Object.values(teethMap).filter(v=>v==='pontic').length;if(p>0)setKind('ブリッジ');else if(b>1)setKind('連結冠');else if(b===1)setKind('単冠');$('qty').value=Math.max(1,b||Number($('qty').value||1));$('autoInfo').textContent=`支台歯 ${b}本 / ポンティック ${p}本`}
function setShade(v,btn){$('shade').value=v;document.querySelectorAll('.shadeQuick button').forEach(x=>x.classList.remove('sel'));btn.classList.add('sel')}function syncShadeButtons(){document.querySelectorAll('.shadeQuick button').forEach(x=>x.classList.toggle('sel',x.textContent===$('shade').value))}function toggleCustomShade(){$('customShade').style.display=$('shade').value==='その他'?'block':'none'}function shadeVal(){return $('shade').value==='その他'?$('customShade').value:$('shade').value}
function toggleShade(){let no=['FMC','インレー単純','インレー複雑','5分の4冠','アンレー','コア','ポンティック'];$('shadeArea').style.display=no.includes($('workType').value)?'none':'block'}
function renderClinicOptions(){let cur=$('clinic')?.value||'';$('clinic').innerHTML=[...clinics].sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0)||a.name.localeCompare(b.name,'ja')).map(c=>`<option>${esc(c.name)}</option>`).join('');if(cur&&clinics.some(c=>c.name===cur))$('clinic').value=cur;applyPrice()}
function applyPrice(){let c=clinics.find(x=>x.name===$('clinic').value);let v=c?.prices?.[$('workType').value];if(v!==undefined)$('unitPrice').value=v}
function priceId(k){return k==='CAD/CAM冠'?'pCAD':'p'+k}
function saveClinic(){if(!$('clinicName').value.trim())return alert('医院名を入れてね');let keys=['前装冠','FMC','ポンティック','CAD/CAM冠','ハイブリッド','ジルコニア','インレー単純','インレー複雑','5分の4冠','アンレー','コア'];let prices={};keys.forEach(k=>prices[k]=Number($(priceId(k)).value||0));let data={name:$('clinicName').value.trim(),favorite:$('clinicFav').checked,prices};let i=clinics.findIndex(c=>c.name===data.name);i>=0?clinics[i]=data:clinics.push(data);clearClinicForm();saveC()}
function editClinic(n){let c=clinics.find(x=>x.name===n);if(!c)return;$('clinicName').value=c.name;$('clinicFav').checked=!!c.favorite;Object.keys(c.prices).forEach(k=>{let el=$(priceId(k));if(el)el.value=c.prices[k]||''})}
function clearClinicForm(){$('clinicName').value='';$('clinicFav').checked=false;document.querySelectorAll('#clinicsTab input[type=number]').forEach(i=>i.value='')}
function renderClinics(){$('clinicList').innerHTML=clinics.map(c=>`<div class="item"><h3>${esc(c.name)} ${c.favorite?'<span class="pill">★</span>':''}</h3><p>前装冠 ${yen(c.prices['前装冠'])} / FMC ${yen(c.prices['FMC'])} / コア ${yen(c.prices['コア'])} / ポンティック ${yen(c.prices['ポンティック'])}</p><div class="actions"><button class="btn sub" onclick="editClinic('${esc(c.name)}')">編集</button><button class="btn danger" onclick="clinics=clinics.filter(x=>x.name!=='${esc(c.name)}');saveC()">削除</button></div></div>`).join('')}
function saveCase(){if(!$('patient').value.trim())return alert('患者名を入れてね');let id=$('editId').value||Date.now().toString(36);let old=cases.find(c=>c.id===id);let data={id,clinic:$('clinic').value,patient:$('patient').value.trim(),category:$('category').value,dueDate:$('dueDate').value,workType:$('workType').value,kind:getKind(),teeth:$('teeth').value,teethData:{...teethMap},shade:shadeVal(),qty:Number($('qty').value||1),unitPrice:Number($('unitPrice').value||0),metal:$('metal').value,memo:$('memo').value,status:old?.status||'未着手',createdAt:old?.createdAt||new Date().toISOString()};let i=cases.findIndex(c=>c.id===id);i>=0?cases[i]=data:cases.push(data);save();resetForm();show('list',document.querySelectorAll('.nav button')[3])}
function resetForm(){$('editId').value='';$('formTitle').textContent='➕ 患者登録';$('patient').value='';$('dueDate').value='';$('workType').value='前装冠';setKind('単冠');clearTeeth();$('shade').value='';$('customShade').value='';$('customShade').style.display='none';document.querySelectorAll('.shadeQuick button').forEach(x=>x.classList.remove('sel'));$('qty').value=1;$('unitPrice').value='';$('metal').value='なし';$('memo').value='';toggleShade();applyPrice()}
function editCase(id){let c=cases.find(x=>x.id===id);if(!c)return;$('editId').value=id;$('formTitle').textContent='✏️ 編集';$('clinic').value=c.clinic;$('patient').value=c.patient;$('category').value=c.category;$('dueDate').value=c.dueDate;$('workType').value=c.workType;setKind(c.kind);teethMap=c.teethData||{};paintTeeth();$('shade').value=c.shade||'';syncShadeButtons();$('qty').value=c.qty;$('unitPrice').value=c.unitPrice;$('metal').value=c.metal;$('memo').value=c.memo||'';toggleShade();show('form',document.querySelectorAll('.nav button')[1])}
function del(id){if(confirm('削除していい？')){cases=cases.filter(c=>c.id!==id);save()}}
function renderList(){let q=($('search').value||'').toLowerCase();let arr=[...cases].sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999')).filter(c=>(c.clinic+c.patient+c.workType).toLowerCase().includes(q));$('caseList').innerHTML=arr.length?arr.map(c=>`<div class="item"><h3>${esc(c.patient)} ${statusBadge(c)} <span class="pill">${esc(c.clinic)}</span> ${badge(c.dueDate)}</h3><p>${esc(c.workType)} / ${esc(c.kind)} / ${esc(c.teeth||'部位未入力')}</p><p>${c.shade?'シェード：'+esc(c.shade)+'　':''}支台:${baseN(c)}本 ポンティック:${ponticN(c)}本 <span class="money">${yen(amount(c))}</span></p><div class="actions"><button class="btn sub" onclick="editCase('${c.id}')">編集</button><button class="btn danger" onclick="del('${c.id}')">削除</button></div></div>`).join(''):'<div class="empty">まだ登録なし</div>'}
function renderSummary(){let m=today().slice(0,7),mon=cases.filter(c=>(c.dueDate||c.createdAt||'').slice(0,7)===m),work={},total=0,pn=0,pm=0;mon.forEach(c=>{work[c.workType]??={q:0,a:0};work[c.workType].q+=baseN(c);work[c.workType].a+=baseN(c)*Number(c.unitPrice||0);pn+=ponticN(c);pm+=ponticN(c)*pPrice(c);total+=amount(c)});$('summaryBox').innerHTML=`<table><tr><th>項目</th><th>本数</th><th>金額</th></tr>${Object.entries(work).map(([k,v])=>`<tr><td>${k}</td><td>${v.q}</td><td class="money">${yen(v.a)}</td></tr>`).join('')}<tr><td>ポンティック</td><td>${pn}</td><td class="money">${yen(pm)}</td></tr><tr><th>合計</th><th></th><th class="money">${yen(total)}</th></tr></table>`}
function renderHome(){let t=tomorrow(),tom=cases.filter(c=>c.dueDate===t),done=tom.filter(c=>c.status==='完了');$('tomorrowCount').textContent=tom.length;$('doneCount').textContent=done.length;$('monthSales').textContent=yen(cases.filter(c=>(c.dueDate||'').slice(0,7)===today().slice(0,7)).reduce((s,c)=>s+amount(c),0));$('tomorrowBox').innerHTML=tom.length?tom.map(c=>`<div class="item"><h3>${esc(c.patient)} ${statusBadge(c)} <span class="pill">${esc(c.clinic)}</span></h3><p>${esc(c.workType)} / ${esc(c.teeth||'')}</p></div>`).join(''):'<div class="empty">明日セットは未登録</div>';let arr=[...cases].filter(c=>c.dueDate).sort((a,b)=>diff(a.dueDate)-diff(b.dueDate)).slice(0,8);$('countdownBox').innerHTML=arr.map(c=>`<div class="item"><h3>${badge(c.dueDate)} ${esc(c.patient)} ${statusBadge(c)}</h3><p>${esc(c.clinic)} / ${esc(c.workType)} / <span class="money">${yen(amount(c))}</span></p></div>`).join('')||'<div class="empty">納期登録なし</div>';renderCal();checkClear(false)}
function renderCal(){let d=new Date(),y=d.getFullYear(),m=d.getMonth();$('calTitle').textContent=`📅 ${y}年${m+1}月`;let first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate(),h='';for(let i=0;i<first;i++)h+='<div class="day"></div>';for(let day=1;day<=last;day++){let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;h+=`<div class="day ${day===d.getDate()?'today':''}">${day}${cases.some(c=>c.dueDate===ds)?'<span class="dot"></span>':''}</div>`}$('calGrid').innerHTML=h}
function checkClear(play=true){let tom=cases.filter(c=>c.dueDate===tomorrow());let ok=tom.length&&tom.every(c=>c.status==='完了');$('clearBanner').style.display=ok?'block':'none';if(ok&&play&&!sessionStorage.lbClear){celebrate();sessionStorage.lbClear='1'}if(!ok)sessionStorage.removeItem('lbClear')}
function celebrate(){
 let ov=$('overlay');
 ov.innerHTML='';
 ov.style.display='block';
 const colors=['#FFD700','#FFC107','#4F9DFF','#34D399','#FFFFFF','#FF7A59','#A78BFA'];
 for(let i=0;i<280;i++){
   let d=document.createElement('div');
   d.className='conf';
   d.style.left=(Math.random()*100)+'vw';
   d.style.background=colors[Math.floor(Math.random()*colors.length)];
   d.style.animationDelay=(Math.random()*0.9)+'s';
   d.style.width=(7+Math.random()*10)+'px';
   d.style.height=(10+Math.random()*14)+'px';
   d.style.opacity=0.75+Math.random()*0.25;
   d.style.transform='rotate('+(Math.random()*360)+'deg)';
   ov.appendChild(d);
 }
 setTimeout(()=>{ov.style.display='none';ov.innerHTML=''},4200);
 try{
   let ac=new(window.AudioContext||window.webkitAudioContext)();
   const play=(freq,start,dur)=>{
     let o=ac.createOscillator(),g=ac.createGain();
     o.type='triangle';o.frequency.value=freq;o.connect(g);g.connect(ac.destination);
     g.gain.setValueAtTime(.04,ac.currentTime+start);
     g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+start+dur);
     o.start(ac.currentTime+start);o.stop(ac.currentTime+start+dur);
   };
   play(880,0,.16); play(1320,.12,.18); play(1760,.28,.24);
 }catch(e){}
 if(navigator.vibrate)navigator.vibrate([60,35,80,35,100]);
}
function renderAll(){renderHome();renderList();renderSummary();renderClinics()}
makeTeeth();renderClinicOptions();toggleShade();renderAll();

let rcLastTap=0;
document.addEventListener('click',()=>{
  const now=Date.now();
  if(now-rcLastTap<320){ celebrate(); }
  rcLastTap=now;
});
</script>
</body></html>
